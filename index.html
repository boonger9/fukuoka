<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#1B2A4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<title>후쿠오카 길잡이</title>
<style>
  :root{
    --paper:#FBF7EF; --card:#FFFFFF; --line:#E8E0D0;
    --ink:#1B2A4A; --ink-soft:#41506B; --muted:#7C7666;
    --ai:#2E5A8C; --ai-tint:#E9F0F8;
    --shu:#D5453B; --shu-tint:#FBEAE7; --done:#A7AEBA; --gold:#F2C14E;
    --sans:-apple-system,"Apple SD Gothic Neo","Hiragino Sans",system-ui,"Malgun Gothic",sans-serif;
    --mincho:"Hiragino Mincho ProN","Yu Mincho","Nanum Myeongjo",serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{font-family:var(--sans);background:var(--paper);color:var(--ink);
    line-height:1.5;font-size:16px;padding-bottom:86px;
    padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
  button,input,select,textarea{font-family:inherit}
  button{cursor:pointer}

  header{position:sticky;top:0;z-index:20;background:var(--ink);color:#fff;
    padding:13px 16px 11px;padding-top:calc(13px + env(safe-area-inset-top))}
  .h-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .h-title{font-size:20px;font-weight:800;letter-spacing:-.01em}
  .h-title b{color:var(--gold)}
  .h-right{display:flex;align-items:center;gap:10px}
  .h-clock{font-variant-numeric:tabular-nums;font-size:14px;font-weight:600;opacity:.92}
  .sos{border:0;background:var(--shu);color:#fff;border-radius:9px;width:34px;height:34px;font-size:17px;font-weight:800}
  .h-sub{font-size:12px;opacity:.74;margin-top:3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .dot{width:7px;height:7px;border-radius:50%;background:#4ED07A;display:inline-block}
  .dot.off{background:#E8A33D}
  .room{background:rgba(255,255,255,.14);border-radius:6px;padding:1px 7px;font-weight:700;letter-spacing:.06em}

  .daybar{position:sticky;z-index:15;background:var(--paper);border-bottom:1px solid var(--line);
    display:flex;gap:8px;padding:10px 14px;overflow-x:auto}
  .pill{flex:0 0 auto;border:1px solid var(--line);background:var(--card);border-radius:999px;
    padding:7px 14px;font-size:13.5px;font-weight:700;color:var(--ink-soft)}
  .pill .d{font-size:11px;color:var(--muted);font-weight:600;margin-left:5px}
  .pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .pill.on .d{color:#cdd6e6}

  main{padding:14px}
  .lead{font-size:13px;color:var(--muted);margin:2px 2px 12px;letter-spacing:.01em}
  .seg{display:flex;background:var(--ai-tint);border-radius:11px;padding:4px;margin-bottom:14px}
  .seg button{flex:1;border:0;background:transparent;border-radius:8px;padding:9px;font-size:14px;font-weight:700;color:var(--ai)}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}

  .ev{display:grid;grid-template-columns:48px 1fr 34px;gap:10px;padding:13px 4px;
    border-bottom:1px solid var(--line);align-items:start}
  .ev .t{font-size:13px;font-weight:800;color:var(--ai);font-variant-numeric:tabular-nums;padding-top:1px}
  .ev .ttl{font-size:15.5px;font-weight:700;letter-spacing:-.01em}
  .ev .dt{font-size:13px;color:var(--muted);margin-top:2px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .chip{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;border-radius:7px;padding:5px 9px;border:1px solid transparent}
  .chip.map{color:var(--ai);background:var(--ai-tint)}
  .chip.say{color:var(--shu);background:var(--shu-tint)}
  .ck{width:24px;height:24px;border-radius:50%;border:2px solid var(--line);background:transparent;
    display:flex;align-items:center;justify-content:center;color:transparent;font-size:13px;font-weight:900;margin-top:1px}
  .ev.done .ttl,.ev.done .dt{color:var(--done);text-decoration:line-through;text-decoration-color:#cfd4dc}
  .ev.done .t{color:var(--done)}
  .ev.done .ck{background:var(--ai);border-color:var(--ai);color:#fff}
  .ev.now{background:linear-gradient(90deg,var(--shu-tint),transparent);border-radius:10px;border-bottom-color:transparent}
  .ev.now .t{color:var(--shu)}
  .nowtag{display:inline-block;font-size:10px;font-weight:900;color:#fff;background:var(--shu);
    border-radius:5px;padding:1px 6px;margin-left:6px;vertical-align:middle;letter-spacing:.04em}
  .ckby{font-size:11px;color:var(--ai);font-weight:700;margin-top:3px}
  .daynote{display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:var(--card);border:1px dashed var(--line);border-radius:11px;padding:11px 13px;margin:4px 0 14px}
  .daynote span{font-size:13px;color:var(--ink-soft);font-weight:600}
  .daynote button{border:1px solid var(--ai);color:var(--ai);background:#fff;border-radius:8px;padding:6px 11px;font-size:12.5px;font-weight:700}

  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:11px;overflow:hidden}
  .card-h{display:flex;align-items:center;gap:11px;padding:14px 15px;font-weight:800;font-size:15.5px}
  .card-h .ico{font-size:18px}
  .card-h .arr{margin-left:auto;color:var(--muted);transition:transform .2s;font-size:13px}
  .card.open .card-h .arr{transform:rotate(90deg)}
  .card-b{display:none;padding:2px 15px 15px;border-top:1px solid var(--line)}
  .card.open .card-b{display:block}
  .card.static .card-b{display:block}
  ol.steps{margin:11px 0 4px;padding-left:0;list-style:none;counter-reset:s}
  ol.steps li{counter-increment:s;position:relative;padding:6px 0 6px 30px;font-size:14.5px;color:var(--ink-soft)}
  ol.steps li::before{content:counter(s);position:absolute;left:0;top:6px;width:20px;height:20px;
    background:var(--ai-tint);color:var(--ai);border-radius:50%;font-size:11.5px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .warn{background:var(--shu-tint);border-radius:10px;padding:10px 12px;font-size:13.5px;color:#8e2c25;font-weight:600;margin:10px 0}
  .pset{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
  .pbtn{border:1px solid var(--ai);color:var(--ai);background:#fff;border-radius:9px;padding:8px 11px;font-size:12.5px;font-weight:700;text-align:left}

  .kv{display:grid;grid-template-columns:74px 1fr;gap:4px 12px;font-size:14px;padding:3px 0}
  .kv .k{color:var(--muted);font-size:12.5px;font-weight:600;padding-top:1px}
  .kv .v{font-weight:600;color:var(--ink)}
  .kv .v.mono{font-variant-numeric:tabular-nums}
  .bigbtn{width:100%;margin-top:11px;border:0;background:var(--ink);color:#fff;border-radius:11px;
    padding:13px;font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:8px}
  .bigbtn.shu{background:var(--shu)}
  .bigbtn.ai{background:var(--ai)}
  .pinrow{display:flex;align-items:center;gap:10px}
  .pinrow button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;color:var(--ai)}
  .calc{display:flex;gap:9px;align-items:center;margin-top:6px}
  .calc input{flex:1;min-width:0;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:16px;color:var(--ink);background:var(--paper)}
  .calc .eq{font-weight:800;color:var(--ai);font-size:17px;white-space:nowrap;font-variant-numeric:tabular-nums}
  .ratehint{font-size:12px;color:var(--muted);margin-top:8px;display:flex;align-items:center;gap:6px}
  .ratehint input{width:64px;border:1px solid var(--line);border-radius:7px;padding:3px 6px;font-size:13px;text-align:right}

  .catbar{display:flex;gap:7px;overflow-x:auto;padding:2px 0 12px}
  .cat{flex:0 0 auto;border:1px solid var(--line);background:var(--card);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:700;color:var(--ink-soft)}
  .cat.on{background:var(--shu);color:#fff;border-color:var(--shu)}
  .phrase{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;gap:12px}
  .phrase .body{flex:1;min-width:0}
  .phrase .ko{font-size:12.5px;color:var(--muted);font-weight:600}
  .phrase .ja{font-size:17px;font-weight:700;margin:3px 0 1px;letter-spacing:-.01em}
  .phrase .yomi{font-size:12.5px;color:var(--ai);font-weight:600}
  .phrase .show{flex:0 0 auto;color:var(--shu);font-size:20px}

  .tot{background:var(--ink);color:#fff;border-radius:14px;padding:15px 16px;margin-bottom:12px}
  .tot .won{font-size:26px;font-weight:800;letter-spacing:-.01em}
  .tot .yen{font-size:13px;opacity:.7;margin-top:2px;font-variant-numeric:tabular-nums}
  .tot .cats{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
  .tot .ct{font-size:11.5px;background:rgba(255,255,255,.14);border-radius:6px;padding:3px 8px;font-weight:600}
  .row{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:11px}
  .row .name{flex:1;min-width:0;font-size:14.5px;font-weight:600}
  .row .name small{display:block;color:var(--muted);font-size:11.5px;font-weight:600;margin-top:1px}
  .row .amt{font-weight:800;font-variant-numeric:tabular-nums;color:var(--ink)}
  .row .del{border:0;background:transparent;color:#c9c2b4;font-size:18px;padding:0 2px}
  .row.bought{background:var(--ai-tint)}
  .wck{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:transparent;font-size:12px;font-weight:900}
  .row.bought .wck{background:var(--ai);border-color:var(--ai);color:#fff}
  .add{display:flex;gap:7px;margin:10px 0 4px;flex-wrap:wrap}
  .add input,.add select{border:1px solid var(--line);border-radius:10px;padding:10px 11px;font-size:14px;background:var(--paper);min-width:0}
  .add .nm{flex:2 1 120px}.add .am{flex:1 1 80px}.add .se{flex:1 1 90px}
  .add .go{flex:0 0 auto;border:0;background:var(--ai);color:#fff;border-radius:10px;padding:10px 14px;font-weight:800}
  .sec-t{font-size:13px;font-weight:800;color:var(--ink-soft);margin:16px 2px 8px;letter-spacing:.02em}

  .note{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:9px}
  .note .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
  .note .who{font-size:12px;font-weight:800;color:var(--ai)}
  .note .tm{font-size:11px;color:var(--muted)}
  .note .tx{font-size:14.5px;color:var(--ink);white-space:pre-wrap;word-break:break-word}
  .note .del{float:right;border:0;background:transparent;color:#c9c2b4;font-size:16px}
  .noteadd{display:flex;gap:7px;margin-bottom:14px}
  .noteadd textarea{flex:1;border:1px solid var(--line);border-radius:11px;padding:11px;font-size:15px;resize:vertical;min-height:46px;background:var(--card)}
  .noteadd button{flex:0 0 auto;align-self:stretch;border:0;background:var(--ink);color:#fff;border-radius:11px;padding:0 16px;font-weight:800}
  .empty{text-align:center;color:var(--muted);font-size:13.5px;padding:26px 10px}

  #big{position:fixed;inset:0;z-index:60;background:var(--paper);display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:58px 16px 64px;overflow:auto}
  #big.on{display:flex}
  #big::before{content:"";position:absolute;top:0;left:0;right:0;height:7px;background:var(--shu)}
  #big .label{position:fixed;top:22px;left:0;right:0;font-size:12px;font-weight:800;letter-spacing:.12em;color:var(--shu)}
  #big .ja{font-family:var(--mincho);font-size:34px;line-height:1.4;font-weight:600;color:var(--ink);white-space:pre-wrap;overflow-wrap:anywhere;width:100%}
  #big .yomi{font-size:16px;color:var(--ai);font-weight:700;margin-top:16px;overflow-wrap:anywhere}
  #big .ko{font-size:14px;color:var(--muted);margin-top:7px;overflow-wrap:anywhere}
  #big .close{position:fixed;bottom:26px;left:0;right:0;font-size:13px;color:var(--muted)}

  .modal{position:fixed;inset:0;z-index:55;background:rgba(20,20,30,.55);display:none;align-items:center;justify-content:center;padding:20px}
  .modal.on{display:flex}
  .sheet{background:var(--paper);border-radius:18px;width:100%;max-width:420px;max-height:86vh;overflow:auto;padding:22px}
  .sheet h3{margin:2px 0 4px;font-size:19px}
  .sheet p{margin:0 0 16px;font-size:13.5px;color:var(--muted)}
  .sheet input{width:100%;border:1px solid var(--line);border-radius:11px;padding:13px;font-size:18px;text-align:center;letter-spacing:.18em;font-weight:800;text-transform:uppercase;background:#fff;margin-bottom:10px}
  .sheet .btn{width:100%;border:0;border-radius:12px;padding:14px;font-size:15px;font-weight:800;margin-bottom:9px}
  .sheet .btn.p{background:var(--ink);color:#fff}
  .sheet .btn.s{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .who-pick{display:flex;gap:9px;margin-bottom:6px}
  .who-pick button{flex:1;border:1px solid var(--line);background:#fff;border-radius:12px;padding:14px 6px;font-weight:800;font-size:15px;color:var(--ink)}
  .who-pick button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .emg{background:#fff;border:1px solid var(--shu);border-left:5px solid var(--shu);border-radius:12px;padding:12px 14px;margin-bottom:9px}
  .emg .ko{font-size:12.5px;color:var(--muted);font-weight:600}
  .emg .ja{font-size:16px;font-weight:800;margin-top:2px;color:#8e2c25}
  .callcard{background:var(--ink);color:#fff;border-radius:12px;padding:13px 15px;margin-top:6px}
  .callcard .line{display:flex;justify-content:space-between;padding:6px 0;font-size:13.5px;border-top:1px solid rgba(255,255,255,.12)}
  .callcard .line:first-child{border-top:0}
  .callcard a{color:var(--gold);text-decoration:none;font-weight:800;font-variant-numeric:tabular-nums}
  .x{position:sticky;top:0;float:right;border:0;background:transparent;font-size:22px;color:var(--muted);margin:-6px -4px 0 0}

  nav{position:fixed;bottom:0;left:0;right:0;z-index:25;background:rgba(251,247,239,.95);
    backdrop-filter:saturate(1.2) blur(8px);border-top:1px solid var(--line);
    display:grid;grid-template-columns:repeat(5,1fr);padding-bottom:env(safe-area-inset-bottom)}
  nav button{border:0;background:transparent;padding:9px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:11px;font-weight:700}
  nav button .ni{font-size:20px;line-height:1}
  nav button.on{color:var(--ink)}
  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;z-index:70;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90%}
  .toast.on{opacity:1}
  .ckcol{display:flex;flex-direction:column;align-items:center;gap:7px}
  .eedit{border:0;background:transparent;color:#b9b1a1;font-size:15px;padding:0;line-height:1}
  .ev.now .eedit{color:var(--shu)}
  .addev{width:100%;margin:8px 0 4px;border:1px dashed var(--ai);color:var(--ai);background:var(--ai-tint);border-radius:11px;padding:13px;font-size:13.5px;font-weight:800}
  .ehidden{font-size:12px;color:var(--muted);text-align:center;margin-top:12px}
  .ehidden button{border:0;background:transparent;color:var(--ai);font-weight:800;text-decoration:underline}
  .efield{margin-bottom:13px}
  .efield label{display:block;font-size:12px;font-weight:800;color:var(--ink-soft);margin-bottom:5px}
  .efield input,.efield textarea{width:100%;border:1px solid var(--line);border-radius:11px;padding:12px;font-size:16px;background:#fff;color:var(--ink)}
  .efield textarea{resize:vertical;min-height:46px}
  .erowbtn{display:flex;gap:9px;margin-top:2px}
  .erowbtn .save{flex:1;border:0;background:var(--ink);color:#fff;border-radius:12px;padding:14px;font-weight:800;font-size:15px}
  .erowbtn .del{flex:0 0 auto;border:1px solid var(--shu);color:var(--shu);background:#fff;border-radius:12px;padding:14px 16px;font-weight:800}
</style>
</head>
<body>
<header>
  <div class="h-row">
    <div class="h-title">후쿠오카 <b>길잡이</b></div>
    <div class="h-right"><span class="h-clock" id="clock">--:--</span>
      <button class="sos" data-modal="emg" aria-label="긴급">🆘</button></div>
  </div>
  <div class="h-sub"><span><span class="dot" id="netdot"></span> <span id="netlbl">온라인</span></span>
    <span>이상후 · 이세은 · 김예지</span><span class="room" id="roomlbl">·····</span></div>
</header>

<div class="daybar" id="daybar"></div>
<main id="view"></main>

<div id="big">
  <div class="label">직원에게 보여주세요</div>
  <div class="ja" id="bigJa"></div>
  <div class="yomi" id="bigYomi"></div>
  <div class="ko" id="bigKo"></div>
  <div class="close">화면을 탭하면 닫힙니다</div>
</div>

<div class="modal" id="roomModal"><div class="sheet" id="roomSheet"></div></div>
<div class="modal" id="emgModal"><div class="sheet" id="emgSheet"></div></div>
<div class="modal" id="editModal"><div class="sheet" id="editSheet"></div></div>

<nav id="nav"></nav>
<div class="toast" id="toast"></div>

<script type="module">

/* ===== 상수 데이터 ===== */
const FAMILY=["이상후","이세은","김예지"];
const HOTEL1={name:"니시테츠 호텔 크룸 하카타",ja:"西鉄ホテル クルーム博多",addr:"〒812-0011 福岡県福岡市博多区博多駅前1丁目17-6",tel:"+81-92-413-5454",q:"西鉄ホテルクルーム博多"};
const HOTEL2={name:"미쓰이 가든 호텔 후쿠오카 나카스",ja:"三井ガーデンホテル福岡中洲",addr:"〒810-0801 福岡県福岡市博多区中洲5-5-1",tel:"+81-92-263-5531",q:"三井ガーデンホテル福岡中洲"};

const DAYS=[
 {key:"d1",label:"1일차",date:"7/2",iso:"2026-07-02",title:"대구 → 후쿠오카 · 하카타",

function fitBig(){
  const wrap=$("big"), el=$("bigJa"); if(!wrap.classList.contains("on"))return;
  const availH=Math.max(140, window.innerHeight-160), availW=window.innerWidth-32;
  el.style.maxWidth=availW+"px";
  let size=Math.min(46, Math.floor(window.innerWidth/8)); el.style.fontSize=size+"px";
  let guard=0;
  while((el.scrollHeight>availH || el.scrollWidth>availW) && size>15 && guard<90){ size--; el.style.fontSize=size+"px"; guard++; }
}

async function createRoom(){
  const code=Math.random().toString(36).slice(2,7).toUpperCase();
  S.room=code;
  await setDoc(doc(db,"trips",code),{rate:9.3,createdAt:Date.now(),createdBy:S.me||""},{merge:true});
  for(const name of SEED_SHOP){ await addDoc(collection(db,"trips",code,"shopping"),{name,done:false,price:0,author:"",ts:Date.now()}); }
  return code;
}
function subscribe(){
  unsub.forEach(u=>u&&u());unsub=[];
  const p=paths();
  unsub.push(onSnapshot(p.meta,d=>{ if(d.exists()&&typeof d.data().rate==="number"){S.rate=d.data().rate; if(S.tab==="info"||S.tab==="ledger")render();} },()=>{}));
  unsub.push(onSnapshot(p.checks,s=>{ S.checks={}; s.forEach(d=>S.checks[d.id]=d.data()); if(S.tab==="sched")render(); },()=>{}));
  unsub.push(onSnapshot(p.notes,s=>{ S.notes=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.ts||0)-(a.ts||0)); if(S.tab==="note")render(); },()=>{}));
  unsub.push(onSnapshot(p.shop,s=>{ S.shop=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.ts||0)-(b.ts||0)); if(S.tab==="ledger")render(); },()=>{}));
  unsub.push(onSnapshot(p.exp,s=>{ S.exp=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.ts||0)-(a.ts||0)); if(S.tab==="ledger")render(); },()=>{}));
  unsub.push(onSnapshot(p.events,s=>{ S.events={}; s.forEach(d=>S.events[d.id]=d.data()); if(S.tab==="sched")render(); },()=>{}));
}

const view=$("view"), daybar=$("daybar");
function dayEvents(d){
  const base=d.events.map((e,i)=>{
    const id=d.key+"_"+i, ov=S.events[id];
    if(ov&&ov.hidden)return null;
    return ov?{...e,id,t:ov.t||e.t,ttl:ov.ttl||e.ttl,dt:(ov.dt!=null?ov.dt:e.dt)}:{...e,id};
  }).filter(Boolean);
  const custom=Object.keys(S.events)
    .filter(id=>S.events[id].custom&&S.events[id].day===d.key&&!S.events[id].hidden)
    .map(id=>{const v=S.events[id];return {id,t:v.t||"",ttl:v.ttl||"",dt:v.dt||"",custom:true};});
  return base.concat(custom).sort((a,b)=>(a.t||"~").localeCompare(b.t||"~"));
}
function curNowId(d){
  const j=nowJST(), iso=j.getFullYear()+"-"+String(j.getMonth()+1).padStart(2,"0")+"-"+String(j.getDate()).padStart(2,"0");
  if(iso!==d.iso)return null;
  const mins=j.getHours()*60+j.getMinutes(); let cur=null;
  dayEvents(d).forEach(e=>{const p=(e.t||"").split(":");if(p.length===2){const m=(+p[0])*60+(+p[1]);if(m<=mins)cur=e.id;}});
  return cur;
}
function renderDaybar(){
  if(S.tab!=="sched"){daybar.style.display="none";return;}
  daybar.style.display="flex";

}

    const id=e.id, c=S.checks[id]||{}, done=!!c.done, now=id===nowId;

    h+=`<div class="ev ${done?'done':''} ${now?'now':''}">

  });
  h+=`<button class="addev" data-addev="${d.key}">＋ 이 날 일정 추가</button>`;

  h+=`<div class="add">

    <input class="am" id="examt" type="number" inputmode="numeric" placeholder="¥금액">
    <select class="se" id="excat">${CATS.map(c=>`<option>${c}</option>`).join("")}</select>
    <select class="se" id="expayer">${FAMILY.map(f=>`<option ${f===S.me?'selected':''}>${f}</option>`).join("")}</select>
    <button class="go" data-addexp="1">추가</button></div>`;
  if(!S.exp.length)h+=`<div class="empty">아직 지출 내역이 없어요.</div>`;
  S.exp.forEach(e=>{
    h+=`<div class="row"><div class="name">${esc(e.name)}<small>${esc(e.cat)} · ${esc(e.payer||e.author||'')}</small></div>

function renderNote(){

  const tabs=[["공통","공통"],["d1","1일차"],["d2","2일차"],["d3","3일차"]];

  if(!list.length)h+=`<div class="empty">이 분류엔 아직 메모가 없어요.</div>`;
  list.forEach(n=>{

const RENDER={sched:renderSched,guide:renderGuide,ledger:renderLedger,note:renderNote,info:renderInfo};
const NAV=[["sched","📅","일정"],["guide","🧭","가이드"],["ledger","💴","가계부"],["note","📒","수첩"],["info","📄","정보"]];
function renderNav(){$("nav").innerHTML=NAV.map(([k,i,l])=>`<button class="${S.tab===k?'on':''}" data-tab="${k}"><span class="ni">${i}</span>${l}</button>`).join("");}
function render(){renderDaybar();renderNav();RENDER[S.tab]();}

/* ===== 액션 ===== */
function doAddShop(){const i=$("shopname");if(i&&i.value.trim()){addShop(i.value.trim());i.value="";}}
async function shareLedger(){
  const doneEv=[]; DAYS.forEach(d=>d.events.forEach((e,i)=>{ if((S.checks[d.key+"_"+i]||{}).done)doneEv.push("✓ "+d.date+" "+e.ttl); }));
  const bought=S.shop.filter(s=>s.done).map(s=>"• "+s.name+(s.price?" ¥"+fmt(s.price):""));
  const total=S.exp.reduce((a,e)=>a+(+e.amount||0),0);
  const lines=["[후쿠오카 여행 요약]"];
  if(doneEv.length)lines.push("",...doneEv);
  if(bought.length)lines.push("","■ 구매",...bought);
  lines.push("","■ 총지출 ¥"+fmt(total)+" (약 "+fmt(total*S.rate)+"원)");
  const text=lines.join("\n");
  try{ if(navigator.share){await navigator.share({title:"후쿠오카 여행 요약",text});} else {await navigator.clipboard.writeText(text);toast("요약을 복사했어요");} }
  catch(e){ try{await navigator.clipboard.writeText(text);toast("요약을 복사했어요");}catch(_){toast("공유 취소");} }
}
async function shareRoom(){
  const text="후쿠오카 길잡이 가족 방 코드: "+S.room+"\n"+location.href;
  try{ if(navigator.share){await navigator.share({title:"가족 방 코드",text});} else {await navigator.clipboard.writeText(text);toast("방 코드를 복사했어요");} }
  catch(e){ toast("공유 취소"); }
}

/* ===== 전역 클릭(이벤트 위임) ===== */
document.addEventListener("click",e=>{
  if(e.target.closest("#big")){$("big").classList.remove("on");return;}
  const t=e.target;
  const tab=t.closest("[data-tab]"); if(tab){S.tab=tab.dataset.tab;render();window.scrollTo(0,0);return;}
  const day=t.closest("[data-day]"); if(day){S.day=day.dataset.day;render();return;}
  const jump=t.closest("[data-jump]"); if(jump){S.tab="note";S.jumpDay=jump.dataset.jump;render();window.scrollTo(0,0);return;}
  const g=t.closest("[data-guide]"); if(g){S.guide=g.dataset.guide;render();return;}
  const cat=t.closest("[data-cat]"); if(cat){S.cat=cat.dataset.cat;render();return;}
  const nt=t.closest("[data-notetab]"); if(nt){S.jumpDay=nt.dataset.notetab;render();return;}
  const sit=t.closest("[data-toggle]"); if(sit){sit.closest(".card").classList.toggle("open");return;}
  const ed=t.closest("[data-edit]"); if(ed){openEdit(ed.dataset.edit,null);return;}
  const av=t.closest("[data-addev]"); if(av){openEdit(null,av.dataset.addev);return;}
  const uh=t.closest("[data-unhide]"); if(uh){unhideDay(uh.dataset.unhide);return;}
  const ck=t.closest("[data-check]"); if(ck){const id=ck.dataset.check;setCheck(id,!(S.checks[id]||{}).done);return;}
  const mapb=t.closest("[data-map]"); if(mapb){mapSearch(mapb.dataset.map);return;}
  const dirb=t.closest("[data-o]"); if(dirb){mapDir(dirb.dataset.o,dirb.dataset.d);return;}
  const sp=t.closest("[data-shop]"); if(sp){const it=S.shop.find(x=>x.id===sp.dataset.shop);if(it)setShop(sp.dataset.shop,{done:!it.done,author:S.me});return;}
  const ds=t.closest("[data-delshop]"); if(ds){delShop(ds.dataset.delshop);return;}
  const as=t.closest("[data-addshop]"); if(as){doAddShop();return;}
  const ae=t.closest("[data-addexp]"); if(ae){const n=$("exname").value.trim(),a=+$("examt").value;if(n&&a>0){addExp({name:n,amount:a,cat:$("excat").value,payer:$("expayer").value});$("exname").value="";$("examt").value="";}return;}
  const de=t.closest("[data-delexp]"); if(de){delExp(de.dataset.delexp);return;}
  const an=t.closest("[data-addnote]"); if(an){const i=$("noteinput");if(i&&i.value.trim()){addNote(an.dataset.addnote,i.value.trim());i.value="";}return;}
  const dn=t.closest("[data-delnote]"); if(dn){delNote(dn.dataset.delnote);return;}
  const sh=t.closest("[data-share]"); if(sh){shareLedger();return;}
  const sr=t.closest("[data-shareroom]"); if(sr){shareRoom();return;}
  const md=t.closest("[data-modal]"); if(md){openEmg();return;}
  const big=t.closest("[data-ja]"); if(big){openBig(big.dataset.ja,big.dataset.yomi||"",big.dataset.ko||"");return;}
});

/* ===== 일정 편집 모달 ===== */
let EDIT=null;
function eventCurrent(id){
  for(const d of DAYS){
    for(let i=0;i<d.events.length;i++){
      if(d.key+"_"+i===id){ const b=d.events[i], ov=S.events[id]||{};
        return {t:ov.t||b.t, ttl:ov.ttl||b.ttl, dt:(ov.dt!=null?ov.dt:b.dt)||"", day:d.key, isBase:true}; }
    }
  }
  const v=S.events[id]||{}; return {t:v.t||"", ttl:v.ttl||"", dt:v.dt||"", day:v.day||S.day, isBase:false};
}
function openEdit(id,addDay){
  let cur = addDay ? {t:"",ttl:"",dt:"",day:addDay,isBase:false} : eventCurrent(id);
  EDIT={id, day:cur.day, isBase:cur.isBase, isNew:!!addDay};
  let h=`<button class="x" data-eclose="1">×</button><h3>${addDay?'＋ 일정 추가':'일정 수정'}</h3><p>저장하면 가족 모두에게 실시간으로 반영돼요.</p>`;
  h+=`<div class="efield"><label>시간</label><input id="ev_t" type="time" value="${esc(cur.t)}"></div>`;
  h+=`<div class="efield"><label>내용</label><input id="ev_ttl" value="${esc(cur.ttl)}" placeholder="예: 캐널시티 저녁"></div>`;
  h+=`<div class="efield"><label>메모 (선택)</label><textarea id="ev_dt" placeholder="장소·주의사항 등">${esc(cur.dt)}</textarea></div>`;
  h+=`<div class="erowbtn"><button class="save" id="ev_save">저장</button>${addDay?'':'<button class="del" id="ev_del">삭제</button>'}</div>`;
  $("editSheet").innerHTML=h; $("editModal").classList.add("on");
  $("ev_save").addEventListener("click",saveEdit);
  const dbtn=$("ev_del"); if(dbtn)dbtn.addEventListener("click",deleteEditEvent);
  setTimeout(()=>{const f=$("ev_ttl");if(f&&!f.value)f.focus();},80);
}
function saveEdit(){
  const t=$("ev_t").value||"", ttl=$("ev_ttl").value.trim(), dt=$("ev_dt").value.trim();
  if(!ttl){toast("내용을 입력하세요");return;}
  if(EDIT.isNew){ setEvent(EDIT.day+"_c"+Date.now(),{custom:true,day:EDIT.day,t,ttl,dt}); }
  else if(EDIT.isBase){ setEvent(EDIT.id,{t,ttl,dt}); }
  else { setEvent(EDIT.id,{custom:true,day:EDIT.day,t,ttl,dt}); }
  $("editModal").classList.remove("on"); toast("저장됐어요");
}
function deleteEditEvent(){
  if(!confirm("이 일정을 삭제할까요?"))return;
  if(EDIT.isBase) setEvent(EDIT.id,{hidden:true}); else delEvent(EDIT.id);
  $("editModal").classList.remove("on"); toast("삭제됐어요");
}
function unhideDay(day){ const d=DAYS.find(x=>x.key===day); d.events.forEach((e,i)=>{const id=day+"_"+i; if(S.events[id]&&S.events[id].hidden)setEvent(id,{hidden:false});}); toast("복원했어요"); }
$("editModal").addEventListener("click",e=>{ if(e.target.id==="editModal"||e.target.closest("[data-eclose]"))$("editModal").classList.remove("on"); });

/* ===== 방 코드 모달 ===== */
function showRoom(){
  let h=`<h3>가족 여행 방</h3><p>가족이 같은 방 코드로 입장하면 일정·체크·가계부·수첩이 실시간으로 공유돼요.</p>`;
  h+=`<div class="who-pick" id="whopick">${FAMILY.map(f=>`<button data-who="${f}" class="${S.me===f?'on':''}">${f}</button>`).join("")}</div>`;
  h+=`<button class="btn p" id="makeRoom">+ 새 방 만들기</button>`;
  h+=`<p style="margin:14px 0 6px;text-align:center">또는 받은 코드로 입장</p>`;
  h+=`<input id="codeInput" placeholder="방 코드" maxlength="6"><button class="btn s" id="joinRoom">입장하기</button>`;
  $("roomSheet").innerHTML=h;$("roomModal").classList.add("on");
  $("whopick").addEventListener("click",ev=>{const b=ev.target.closest("[data-who]");if(b){S.me=b.dataset.who;$("whopick").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b));}});
  $("makeRoom").addEventListener("click",async()=>{ if(!S.me){toast("먼저 이름을 선택하세요");return;} $("makeRoom").textContent="만드는 중…"; try{const code=await createRoom(); finishRoom(code);}catch(e){toast("방 생성 실패 — 잠시 후 다시");$("makeRoom").textContent="+ 새 방 만들기";} });
  $("joinRoom").addEventListener("click",()=>{ if(!S.me){toast("먼저 이름을 선택하세요");return;} const c=($("codeInput").value||"").trim().toUpperCase(); if(c.length<4){toast("코드를 확인하세요");return;} finishRoom(c); });
}
function finishRoom(code){
  S.room=code; localStorage.setItem("fk_room",code); localStorage.setItem("fk_me",S.me);
  $("roomModal").classList.remove("on"); $("roomlbl").textContent=code;
  subscribe(); render();
}

/* ===== 네트워크 ===== */
function net(){const on=navigator.onLine;$("netdot").classList.toggle("off",!on);$("netlbl").textContent=on?"온라인":"오프라인(동기화 대기)";}
addEventListener("online",net);addEventListener("offline",net);net();

/* ===== 시계 ===== */
function tick(){const j=nowJST();$("clock").textContent=String(j.getHours()).padStart(2,"0")+":"+String(j.getMinutes()).padStart(2,"0");}
tick();setInterval(tick,20000);

/* ===== 시작 ===== */
if(S.room&&S.me){ $("roomlbl").textContent=S.room; subscribe(); render(); }
else { renderNav(); render(); showRoom(); }

/* ===== 서비스워커 ===== */
if("serviceWorker" in navigator){ addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{})); }
</script>
